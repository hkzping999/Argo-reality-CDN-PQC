# Argo Reality PQC MultiProfile config example
# Usage: bash argox.sh -f config.example.conf

NODE_NAME='Argo-PQC-MP'
UUID=''
WS_PATH='argox'

# Reality direct
REALITY_DOMAIN=''
TLS_SERVER='addons.mozilla.org'
REALITY_COMPAT_PORT=443
REALITY_PQC_PORT=8443

# Cloudflare Tunnel
# Empty ARGO_TOKEN = Quick Tunnel / trycloudflare.com, suitable for lab tests.
ARGO_TOKEN=''
ARGO_DOMAIN=''
SERVER=''
SERVER_PORT=443

# Multi-profile switches
ENABLE_REALITY_COMPAT=y
ENABLE_REALITY_PQC=y
ENABLE_WS_COMPAT=y
ENABLE_WS_PQC=y
ENABLE_XHTTP=auto

# VLESS post-quantum encryption. Default strict=n keeps compat profiles deployable if vlessenc is unavailable.
ENABLE_VLESS_PQC=y
VLESS_PQC_STRICT=n
VLESS_PQC_DISABLE_0RTT=y
VLESS_PQC_RESUME='600s'
VLESS_PQC_CLIENT_RTT='1rtt'
